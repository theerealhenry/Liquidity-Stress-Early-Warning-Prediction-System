# =============================================================================
# XGBoost v2 — Baseline Multi-Model Configuration
# Project : Liquidity Stress Early Warning
# Stage   : baseline
# Author  : Henry Otsyula
# =============================================================================

project:
  name: liquidity_stress_early_warning
  seed: 42
  n_jobs: -1

experiment:
  stage: baseline
  version: v2_baseline
  track_run_id: true

# -----------------------------------------------------------------------------
# DATA
# -----------------------------------------------------------------------------
data:
  train_path: data/raw/Train.csv
  test_path:  data/raw/Test.csv
  target:     liquidity_stress_next_30d
  id_column:  ID

# -----------------------------------------------------------------------------
# FEATURES
# -----------------------------------------------------------------------------
features:
  drop_columns:
    - ID
    - liquidity_stress_next_30d
  use_all_features: true
  selection:
    enabled: false

# -----------------------------------------------------------------------------
# PREPROCESSING
# -----------------------------------------------------------------------------
preprocessing:
  clip_quantiles: [0.001, 0.999]
  fillna_value: 0
  enforce_numeric: true
  remove_constant: true
  optimize_memory: true
  align_test_columns: true

# -----------------------------------------------------------------------------
# CROSS-VALIDATION
# -----------------------------------------------------------------------------
cv:
  n_splits: 5
  shuffle: true
  stratified: true
  group_column: null
  time_series: false
  return_fold_indices: true
  return_fold_predictions: true

# -----------------------------------------------------------------------------
# MODEL
# XGBoost equivalent of LightGBM baseline — tuned for comparable complexity
# scale_pos_weight mirrors class imbalance ratio (~3.8 negative per positive)
# -----------------------------------------------------------------------------
model:
  name: xgboost

  params:
    objective: binary:logistic
    eval_metric:
      - logloss
      - auc
    booster: gbtree
    learning_rate: 0.03
    n_estimators: 1500
    max_depth: 6
    min_child_weight: 50
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.5
    reg_lambda: 1.0
    scale_pos_weight: 3.8
    max_bin: 256
    tree_method: hist          # fast histogram — matches LightGBM behaviour
    random_state: 42
    n_jobs: -1
    verbosity: 0
    use_label_encoder: false

# -----------------------------------------------------------------------------
# TRAINING
# -----------------------------------------------------------------------------
training:
  early_stopping_rounds: 100
  verbose_eval: 100
  deterministic: true

# -----------------------------------------------------------------------------
# EVALUATION
# -----------------------------------------------------------------------------
evaluation:
  primary_metric: logloss
  metrics:
    logloss:
      weight: 0.6
      direction: minimize
    roc_auc:
      weight: 0.4
      direction: maximize
  threshold_optimization:
    enabled: false

# -----------------------------------------------------------------------------
# ARTIFACTS
# -----------------------------------------------------------------------------
artifacts:
  save_models: true
  save_oof_predictions: true
  save_fold_predictions: true
  save_fold_indices: true
  save_feature_importance: true
  save_feature_list: true
  save_preprocessor: true
  save_metadata: true
  save_config_copy: true

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
logging:
  level: INFO
  log_to_file: true
  track_feature_count: true
  track_memory: true
  track_cv_scores: true
  track_run_time: true