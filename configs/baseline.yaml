# =========================================================
# PROJECT CONFIGURATION
# =========================================================

project:
  name: liquidity_stress_early_warning
  version: v2_baseline_production
  seed: 42
  n_jobs: -1

  # Experiment tracking
  experiment:
    enabled: true
    name: baseline_lgbm
    track_run_id: true


# =========================================================
# DATA CONFIGURATION
# =========================================================

data:
  train_path: data/raw/Train.csv
  test_path: data/raw/Test.csv

  target: liquidity_stress_next_30d
  id_column: ID

  time_column: null


# =========================================================
# FEATURE CONFIGURATION
# =========================================================

features:
  drop_columns:
    - ID
    - liquidity_stress_next_30d

  use_all_features: true

  selection:
    enabled: false
    method: null   # "importance", "correlation", "shap"
    top_k: null


# =========================================================
# PREPROCESSING CONFIGURATION
# =========================================================

preprocessing:
  clip_quantiles: [0.001, 0.999]
  fillna_value: 0
  enforce_numeric: true
  remove_constant: true
  optimize_memory: true

  # Future-proof
  align_test_columns: true


# =========================================================
# CROSS VALIDATION CONFIGURATION
# =========================================================

cv:
  n_splits: 5
  shuffle: true
  stratified: true

  # Advanced options
  group_column: null
  time_series: false

  # Artifact tracking
  return_fold_indices: true
  return_fold_predictions: true


# =========================================================
# MODEL CONFIGURATION (MODEL-AGNOSTIC)
# =========================================================

model:
  name: lightgbm   # switch: xgboost / catboost

  params:
    objective: binary
    metric: ["binary_logloss", "auc"]

    boosting_type: gbdt

    learning_rate: 0.03
    n_estimators: 1500

    num_leaves: 64
    max_depth: -1

    min_child_samples: 50
    min_child_weight: 1e-3

    subsample: 0.8
    subsample_freq: 1
    colsample_bytree: 0.8

    reg_alpha: 0.5
    reg_lambda: 1.0

    max_bin: 255

    scale_pos_weight: 5.5

    verbosity: -1
    random_state: 42
    n_jobs: -1


# =========================================================
# TRAINING CONFIGURATION
# =========================================================

training:
  early_stopping_rounds: 100
  verbose_eval: 100

  # Output structure (BASE DIR — run folders created inside)
  output_dir: outputs/baseline/

  # Artifact control
  save_models: true
  save_oof: true
  save_feature_importance: true
  save_fold_predictions: true
  save_fold_indices: true

  # Reproducibility
  deterministic: true


# =========================================================
# EVALUATION CONFIGURATION
# =========================================================

evaluation:
  primary_metric: logloss

  metrics:
    logloss:
      weight: 0.6
      direction: minimize

    roc_auc:
      weight: 0.4
      direction: maximize

  threshold_optimization:
    enabled: false


# =========================================================
# CALIBRATION CONFIGURATION
# =========================================================

calibration:
  enabled: false   # enabled in calibration phase

  methods:
    - isotonic
    - sigmoid
    - temperature

  default_method: isotonic

  cv_folds: 5


# =========================================================
# ARTIFACT MANAGEMENT
# =========================================================

artifacts:
  save_predictions: true
  save_oof_predictions: true
  save_models: true
  save_config_copy: true

  # aligned with upgraded pipeline
  save_metadata: true
  save_feature_list: true
  save_preprocessor: true


# =========================================================
# LOGGING CONFIGURATION
# =========================================================

logging:
  level: INFO
  log_to_file: true
  log_dir: logs/

  track_feature_count: true
  track_memory: true
  track_cv_scores: true
  track_run_time: true