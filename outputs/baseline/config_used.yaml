artifacts:
  save_config_copy: true
  save_models: true
  save_oof_predictions: true
  save_predictions: true
cv:
  group_column: null
  n_splits: 5
  shuffle: true
  stratified: true
  time_series: false
data:
  id_column: ID
  target: liquidity_stress_next_30d
  test_path: data/raw/Test.csv
  time_column: null
  train_path: data/raw/Train.csv
evaluation:
  metrics:
    logloss:
      direction: minimize
      weight: 0.6
    roc_auc:
      direction: maximize
      weight: 0.4
  primary_metric: logloss
  threshold_optimization:
    enabled: false
features:
  drop_columns:
  - ID
  - liquidity_stress_next_30d
  selection:
    enabled: false
    method: null
    top_k: null
  use_all_features: true
logging:
  level: INFO
  log_dir: logs/
  log_to_file: true
  track_cv_scores: true
  track_feature_count: true
  track_memory: true
model:
  name: lightgbm
  params:
    boosting_type: gbdt
    colsample_bytree: 0.8
    learning_rate: 0.03
    max_bin: 255
    max_depth: -1
    metric:
    - binary_logloss
    - auc
    min_child_samples: 50
    min_child_weight: 1e-3
    n_estimators: 1500
    n_jobs: -1
    num_leaves: 64
    objective: binary
    random_state: 42
    reg_alpha: 0.5
    reg_lambda: 1.0
    scale_pos_weight: 5.5
    subsample: 0.8
    subsample_freq: 1
    verbosity: -1
preprocessing:
  clip_quantiles:
  - 0.001
  - 0.999
  enforce_numeric: true
  fillna_value: 0
  optimize_memory: true
  remove_constant: true
project:
  n_jobs: -1
  name: liquidity_stress_early_warning
  seed: 42
  version: v1_baseline
training:
  early_stopping_rounds: 100
  output_dir: outputs/baseline/
  save_feature_importance: true
  save_model: true
  save_oof: true
  verbose_eval: 100
